<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North Garage — Админ-панель</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.08) 0%, transparent 60%);
}
.login-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 48px;
    width: 420px;
    max-width: 92vw;
}
.login-logo {
    font-size:28px;
    font-weight:800;
    text-align:center;
    margin-bottom:8px;
    letter-spacing:-0.5px;
}
.text-gold { color: #d4af37; }
.login-sub {
    font-size:14px;
    color:#888;
    text-align:center;
    margin-bottom:32px;
}
.form-group { margin-bottom:20px; }
.form-group label {
    display:block;
    font-size:13px;
    font-weight:500;
    color:#aaa;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}
.form-group input {
    width:100%;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    padding:14px 16px;
    color:#fff;
    font-size:15px;
    transition:border-color 0.3s;
    outline:none;
}
.form-group input:focus { border-color:#d4af37; }
.btn {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s;
    background:linear-gradient(135deg, #d4af37, #b8962c);
    color:#0a0a0a;
}
.btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(212,175,55,0.3); }
.error {
    background: rgba(239,68,68,0.1);
    color: #ef4444;
    padding:12px;
    border-radius:8px;
    font-size:14px;
    margin-bottom:20px;
    text-align:center;
    border:1px solid rgba(239,68,68,0.2);
}
</style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">North<span class="text-gold">Garage</span></div>
    <p class="login-sub">Вход в админ-панель</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="login" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Войти</button>
    </form>
</div>
</body>
</html>
