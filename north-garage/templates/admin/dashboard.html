<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — North Garage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
}
.text-gold { color: #d4af37; }
.navbar {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 16px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
}
.navbar-logo {
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.5px;
    text-decoration:none;
    color:#fff;
}
.navbar-actions { display:flex; align-items:center; gap:16px; }
.navbar-actions span { font-size:14px; color:#888; }
.btn-logout {
    padding:8px 20px;
    border:1px solid #333;
    border-radius:8px;
    background:transparent;
    color:#e0e0e0;
    cursor:pointer;
    font-size:13px;
    transition:all 0.3s;
    text-decoration:none;
}
.btn-logout:hover { border-color:#ef4444; color:#ef4444; }
.container { max-width:1400px; margin:0 auto; padding:32px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:32px; }
.stat-card {
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    padding:24px;
}
.stat-num { font-size:32px; font-weight:800; color:#fff; }
.stat-label { font-size:13px; color:#888; margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }
.search-box {
    display:flex;
    gap:12px;
    margin-bottom:24px;
}
.search-box input {
    flex:1;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    padding:12px 16px;
    color:#fff;
    font-size:14px;
    outline:none;
    transition:border-color 0.3s;
}
.search-box input:focus { border-color:#d4af37; }
.search-box button {
    padding:12px 28px;
    background:linear-gradient(135deg, #d4af37, #b8962c);
    color:#0a0a0a;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s;
}
.search-box button:hover { transform:translateY(-1px); }
.table-wrap {
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
    overflow-x:auto;
}
table { width:100%; border-collapse:collapse; }
thead th {
    padding:16px 20px;
    text-align:left;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#888;
    border-bottom:1px solid #222;
    background:#0d0d0d;
}
tbody td {
    padding:16px 20px;
    font-size:14px;
    border-bottom:1px solid #1a1a1a;
}
tbody tr:hover { background:rgba(212,175,55,0.03); }
.status-badge {
    display:inline-block;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:500;
    background:rgba(16,185,129,0.1);
    color:#10b981;
}
.btn-delete {
    padding:6px 14px;
    border:1px solid rgba(239,68,68,0.3);
    border-radius:6px;
    background:transparent;
    color:#ef4444;
    cursor:pointer;
    font-size:12px;
    transition:all 0.3s;
}
.btn-delete:hover { background:rgba(239,68,68,0.1); }
.empty { text-align:center; padding:60px 20px; color:#666; }
.pagination {
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:24px;
}
.pagination button {
    padding:8px 16px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    color:#e0e0e0;
    cursor:pointer;
    transition:all 0.3s;
}
.pagination button:hover { border-color:#d4af37; color:#d4af37; }
.pagination button.active { background:#d4af37; color:#0a0a0a; border-color:#d4af37; }
@media (max-width:768px) {
    .container { padding:16px; }
    thead th, tbody td { padding:12px 14px; font-size:13px; }
    .stats { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<nav class="navbar">
    <a href="/admin" class="navbar-logo">North<span class="text-gold">Garage</span> <span style="font-size:13px;color:#888;font-weight:400;">админ</span></a>
    <div class="navbar-actions">
        <span>{{ session.get('admin_login', '') }}</span>
        <a href="/" class="btn-logout" style="border-color:#333;color:#e0e0e0;" target="_blank">На сайт</a>
        <a href="/admin/logout" class="btn-logout">Выйти</a>
    </div>
</nav>
<div class="container">
    <div class="stats">
        <div class="stat-card">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">Всего заявок</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="statToday">0</div>
            <div class="stat-label">За сегодня</div>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск по имени..." onkeydown="if(event.key==='Enter')searchApps()">
        <button onclick="searchApps()">Найти</button>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Автомобиль</th>
                    <th>Услуга</th>
                    <th>Дата</th>
                    <th>Комментарий</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="appsTable"></tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>
</div>
<script>
let currentPage = 1;
let currentSearch = '';

async function loadApps(page = 1) {
    currentPage = page;
    const params = new URLSearchParams({ page, per_page: 20 });
    if (currentSearch) params.set('search', currentSearch);
    const res = await fetch('/api/applications?' + params);
    const data = await res.json();
    const tbody = document.getElementById('appsTable');
    tbody.innerHTML = '';
    if (data.applications.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty">Заявок пока нет</div></td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    data.applications.forEach(app => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>#${app.id}</td>
            <td><strong>${escapeHtml(app.name)}</strong></td>
            <td>${escapeHtml(app.phone)}</td>
            <td>${escapeHtml(app.car_brand || '-')}</td>
            <td>${escapeHtml(app.service || '-')}</td>
            <td>${escapeHtml(app.preferred_date || '-')}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(app.comment || '-')}</td>
            <td><span class="status-badge">${app.status}</span></td>
            <td><button class="btn-delete" onclick="deleteApp(${app.id})">Удалить</button></td>
        `;
        tbody.appendChild(tr);
    });
    renderPagination(data.page, data.pages);
}

function renderPagination(current, total) {
    const el = document.getElementById('pagination');
    el.innerHTML = '';
    if (total <= 1) return;
    for (let i = 1; i <= total; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === current) btn.className = 'active';
        btn.onclick = () => loadApps(i);
        el.appendChild(btn);
    }
}

async function deleteApp(id) {
    if (!confirm('Удалить заявку #' + id + '?')) return;
    await fetch('/api/applications/' + id, { method: 'DELETE' });
    loadApps(currentPage);
}

function searchApps() {
    currentSearch = document.getElementById('searchInput').value.trim();
    loadApps(1);
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statTotal').textContent = data.total;
    document.getElementById('statToday').textContent = data.today;
}

loadStats();
loadApps();
</script>
</body>
</html>
